<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Precios combustible España</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>Precios de combustible (España)</h1>
      <div class="controls">
        <label>
          Tipo de combustible:
          <select id="fuelType">
            <option value="Precio Gasolina 95 E5">Gasolina 95</option>
            <option value="Precio Gasolina 98 E5">Gasolina 98</option>
            <option value="Precio Gasoleo A">Diésel A</option>
          </select>
        </label>
        <label>
          Radio (km):
          <input id="radiusKm" type="number" min="1" max="200" value="10" />
        </label>
        <button id="refreshBtn">Actualizar</button>
      </div>
    </header>

    <main>
      <section id="mapSection">
        <div id="map"></div>
      </section>

      <section id="tableSection">
        <div class="table-controls">
          <input id="searchInput" placeholder="Buscar estación, municipio..." />
          <button id="nearestBtn">Gasolinera más barata cerca de flota</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Estación</th>
              <th>Municipio</th>
              <th>Provincia</th>
              <th>Precio (€/L)</th>
              <th>Dist (km)</th>
            </tr>
          </thead>
          <tbody id="stationsTableBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
