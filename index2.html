<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* Forzamos que el cuerpo no tenga scroll propio */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif;
        }
        #gs-container {
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa el 100% de la ventana */
        }
        #gs-bar {
            background: #1e293b;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0; /* Evita que la barra se encoja */
        }
        /* El mapa debe crecer para ocupar el resto */
        #gs-map {
            flex-grow: 1; 
            width: 100%;
            background: #cbd5e1; /* Color de fondo para saber si el div existe */
        }
        .gb { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .gg { background: #16a34a; color: white; }
        .gb2 { background: #0ea5e9; color: white; }
        #gs-st { color: #94a3b8; font-size: 12px; margin-left: auto; }
    </style>
</head>
<body>

<div id="gs-container">
    <div id="gs-bar">
        <button class="gb gg" id="gs-bv">🚛 Vehículos</button>
        <button class="gb gb2" id="gs-bg">⛽ Gasolineras</button>
        <span id="gs-st">Iniciando mapa...</span>
    </div>
    <div id="gs-map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/**
 * LÓGICA REFORZADA PARA GEOTAB
 */
var gasolinerasAddIn = function (api, state) {
    var map = null;

    function initMap() {
        if (map) return; // Evitar duplicados

        // Inicializar el objeto mapa
        map = L.map('gs-map').setView([40.41, -3.70], 6);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- TRUCO CLAVE PARA GEOTAB ---
        // Forzamos al mapa a recalcular su tamaño cada 300ms durante el primer segundo
        // Esto soluciona el problema de la pantalla gris/blanca
        var fixes = 0;
        var interval = setInterval(function() {
            map.invalidateSize();
            fixes++;
            if(fixes > 5) clearInterval(interval);
        }, 300);
        
        document.getElementById("gs-st").textContent = "Mapa Cargado";
    }

    return {
        initialize: function (api, state, callback) {
            initMap();

            // Configurar botones
            document.getElementById("gs-bg").onclick = function() {
                document.getElementById("gs-st").textContent = "Cargando datos...";
                fetch("https://proxy-gasolineras.onrender.com/gasolineras")
                    .then(r => r.json())
                    .then(data => {
                        var list = data.ListaEESSPrecio || [];
                        list.slice(0, 50).forEach(s => {
                            var lat = parseFloat(s.Latitud.replace(",", "."));
                            var lon = parseFloat(s["Longitud (WGS84)"].replace(",", "."));
                            L.marker([lat, lon]).addTo(map).bindPopup(s.Rótulo);
                        });
                        document.getElementById("gs-st").textContent = "Gasolineras OK";
                    });
            };

            document.getElementById("gs-bv").onclick = function() {
                if(!api) return;
                api.call("Get", { typeName: "DeviceStatusInfo" }, function(res) {
                    res.forEach(d => {
                        if(d.latitude) L.marker([d.latitude, d.longitude]).addTo(map);
                    });
                    document.getElementById("gs-st").textContent = "Vehículos OK";
                });
            };

            if (callback) callback();
        },
        focus: function (api, state) {
            if (map) map.invalidateSize(); // Refrescar al volver a la pestaña
        },
        blur: function () {}
    };
};

// Registro
if (typeof geotab !== "undefined") {
    geotab.addin.gasolineras = gasolinerasAddIn;
} else {
    // Si entras por fuera de Geotab
    window.onload = function() {
        var test = gasolinerasAddIn(null, null);
        test.initialize(null, null, null);
    };
}
</script>
</body>
</html>
