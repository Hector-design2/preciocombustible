<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gasolineras Geotab</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
        #addin-container { display: flex; flex-direction: column; height: 100vh; }
        #toolbar { height: 50px; background: #fff; border-bottom: 1px solid #ccc; display: flex; align-items: center; padding: 0 10px; gap: 8px; flex-shrink: 0; }
        #map { flex: 1; width: 100%; background: #eee; }
        .btn { padding: 6px 12px; cursor: pointer; font-weight: bold; border: 1px solid #999; border-radius: 3px; background: #eee; }
        #status { margin-left: auto; font-size: 11px; color: #666; }
    </style>
</head>
<body>
    <div id="addin-container">
        <div id="toolbar">
            <button id="btnV" class="btn">🚛 Vehículos</button>
            <button id="btnG" class="btn">⛽ Gasolineras</button>
            <span id="status">Esperando a Geotab...</span>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Esta función contiene toda tu lógica
        var miAddIn = function(api, state) {
            var map;
            return {
                initialize: function(api, state, callback) {
                    // Crear mapa
                    map = L.map('map').setView([40.41, -3.70], 6);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    // BOTÓN VEHÍCULOS (API GEOTAB)
                    document.getElementById("btnV").onclick = function() {
                        document.getElementById("status").textContent = "Cargando flota...";
                        api.call("Get", { typeName: "DeviceStatusInfo" }, function(res) {
                            res.forEach(function(d) {
                                if(d.latitude) L.marker([d.latitude, d.longitude]).addTo(map);
                            });
                            document.getElementById("status").textContent = res.length + " vehículos OK";
                        });
                    };

                    // BOTÓN GASOLINERAS
                    document.getElementById("btnG").onclick = function() {
                        fetch("https://proxy-gasolineras.onrender.com/gasolineras")
                            .then(r => r.json()).then(data => {
                                (data.ListaEESSPrecio || []).slice(0,50).forEach(s => {
                                    var lat = parseFloat(s.Latitud.replace(",","."));
                                    var lon = parseFloat(s["Longitud (WGS84)"].replace(",","."));
                                    L.marker([lat, lon]).addTo(map).bindPopup(s.Rótulo);
                                });
                                document.getElementById("status").textContent = "Gasolineras OK";
                            });
                    };

                    document.getElementById("status").textContent = "Conectado a Geotab";
                    setTimeout(function() { map.invalidateSize(); }, 500);
                    if (callback) callback();
                },
                focus: function() { if(map) map.invalidateSize(); },
                blur: function() {}
            };
        };

        // REGISTRO DE SEGURIDAD
        // Usamos el nombre 'gasolineras' en minúsculas para evitar líos
        if (typeof geotab !== "undefined") {
            geotab.addin.gasolineras = miAddIn;
        } else {
            // Modo Web
            window.onload = function() {
                var test = miAddIn(null, null);
                test.initialize(null, null, null);
            };
        }
    </script>
</body>
</html>
